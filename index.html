<!doctype html>
<html lang="pl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Badanie: styl komunikacji w e-mailach biznesowych</title>
  <style>
    :root{
      --bg:#0b1220; --card:#101a2e; --muted:#93a4c7; --text:#eaf0ff;
      --accent:#7c5cff; --accent2:#00d3a7; --danger:#ff5c7a; --line:#223255;
      --hl: rgba(124,92,255,.25);
      --hl-border: rgba(124,92,255,.65);
      --shadow: 0 16px 40px rgba(0,0,0,.35);
      --radius: 18px;
      --mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono","Courier New", monospace;
      --sans: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, "Noto Sans", "Liberation Sans", sans-serif;
      color-scheme: dark;
    }
    *{box-sizing:border-box}
    body{
      margin:0; font-family:var(--sans);
      background: radial-gradient(1000px 600px at 20% 0%, rgba(124,92,255,.25), transparent 55%),
      radial-gradient(900px 600px at 100% 20%, rgba(0,211,167,.18), transparent 50%),
      var(--bg);
      color:var(--text);
      min-height:100vh;
    }
    .wrap{max-width:980px; margin:0 auto; padding:28px 18px 64px}
    header{display:flex; gap:16px; align-items:center; justify-content:space-between; margin-bottom:18px}
    h1{font-size:22px; margin:0 0 4px; letter-spacing:.2px}
    h2{font-size:18px; margin:0 0 12px; letter-spacing:.2px}
    h3{font-size:15px; margin:18px 0 8px; color:var(--text)}
    .sub{color:var(--muted); margin:0; line-height:1.45; font-size:14px}
    .pill{
      font-size:12px; padding:6px 10px; border:1px solid var(--line); border-radius:999px;
      color:var(--muted); background: rgba(255,255,255,.03); white-space:nowrap;
    }

    /* === Progress bar === */
    .progress{
      height:6px; background: rgba(255,255,255,.06); border-radius:999px;
      overflow:hidden; margin-bottom:18px;
    }
    .progress > span{
      display:block; height:100%;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      transition: width .35s ease;
    }

    /* === Card === */
    .card{
      background: linear-gradient(180deg, rgba(255,255,255,.04), rgba(255,255,255,.02));
      border:1px solid var(--line); border-radius:var(--radius); box-shadow:var(--shadow);
      overflow:hidden; margin-bottom:16px;
    }
    .card-h{padding:14px 16px; border-bottom:1px solid var(--line); display:flex; justify-content:space-between; align-items:center; gap:12px}
    .card-h strong{font-size:13px; letter-spacing:.4px; text-transform:uppercase; color:var(--muted)}
    .card-b{padding:18px}

    .row{display:flex; gap:10px; flex-wrap:wrap}
    .grid2{display:grid; grid-template-columns: 1fr 1fr; gap:12px}
    .grid12{display:grid; grid-template-columns: 1.2fr .8fr; gap:16px}
    @media (max-width: 820px){ .grid2, .grid12{grid-template-columns:1fr} }

    label{font-size:13px; color:var(--muted); display:block; margin:14px 0 6px}
    .field-hint{font-size:12px; color:var(--muted); margin:4px 0 0; line-height:1.4}

    input[type="text"], textarea, select{
      width:100%; padding:11px 12px; border-radius:12px; border:1px solid var(--line);
      background: rgba(0,0,0,.28); color:var(--text); outline:none;
      font-family:var(--sans); font-size:14px;
      transition: border-color .2s ease, background .2s ease;
    }
    input[type="text"]:focus, textarea:focus, select:focus{
      border-color: rgba(124,92,255,.65);
      background: rgba(0,0,0,.36);
    }
    /* === Spójny, czytelny select (poprawa kontrastu listy rozwijanej) === */
    select{
      appearance:none; -webkit-appearance:none; -moz-appearance:none;
      background-image:
        linear-gradient(45deg, transparent 50%, var(--muted) 50%),
        linear-gradient(135deg, var(--muted) 50%, transparent 50%);
      background-position: calc(100% - 18px) 50%, calc(100% - 12px) 50%;
      background-size: 6px 6px, 6px 6px;
      background-repeat: no-repeat;
      padding-right: 36px;
      cursor:pointer;
    }
    select option{
      background:#101a2e; color:var(--text);
      padding:8px;
    }
    textarea{min-height:96px; resize:vertical; line-height:1.45}
    input[type="range"]{width:100%; accent-color: var(--accent)}

    /* === Buttons === */
    .btn{
      display:inline-flex; align-items:center; justify-content:center; gap:8px;
      border:1px solid var(--line); background: rgba(255,255,255,.04);
      color:var(--text); padding:11px 16px; border-radius:12px; cursor:pointer;
      transition: transform .06s ease, background .2s ease, border-color .2s ease;
      user-select:none; font-size:14px; font-family:var(--sans);
    }
    .btn:hover{background: rgba(255,255,255,.08); border-color: rgba(124,92,255,.6)}
    .btn:active{transform: translateY(1px)}
    .btn.primary{background: rgba(124,92,255,.22); border-color: rgba(124,92,255,.6); color:#fff}
    .btn.primary:hover{background: rgba(124,92,255,.32)}
    .btn.good{background: rgba(0,211,167,.16); border-color: rgba(0,211,167,.55)}
    .btn.danger{background: rgba(255,92,122,.14); border-color: rgba(255,92,122,.5)}
    .btn:disabled{opacity:.5; cursor:not-allowed}

    .nav{display:flex; justify-content:space-between; gap:10px; margin-top:22px; flex-wrap:wrap}

    /* === Choices (radio/checkbox tiles) === */
    .choices{display:flex; flex-direction:column; gap:8px; margin-top:6px}
    .choice{
      display:flex; align-items:center; gap:10px;
      padding:11px 14px; border:1px solid var(--line); border-radius:12px;
      background: rgba(255,255,255,.03); cursor:pointer;
      transition: background .15s ease, border-color .15s ease;
      font-size:14px; line-height:1.35;
    }
    .choice:hover{background: rgba(255,255,255,.06); border-color: rgba(124,92,255,.45)}
    .choice input{accent-color: var(--accent); width:18px; height:18px; flex:0 0 18px}
    .choice.selected{background: rgba(124,92,255,.14); border-color: rgba(124,92,255,.6)}
    .choices.horiz{flex-direction:row; flex-wrap:wrap}
    .choices.horiz .choice{flex:1 1 auto; min-width:120px}

    /* === Likert === */
    .likert{
      display:grid; grid-template-columns: repeat(5, 1fr); gap:6px; margin:8px 0 6px;
    }
    .likert label{
      display:flex; flex-direction:column; align-items:center; justify-content:center;
      gap:6px; padding:10px 6px; border:1px solid var(--line); border-radius:12px;
      background: rgba(255,255,255,.03); cursor:pointer; margin:0;
      transition: background .15s ease, border-color .15s ease;
      font-size:13px; color:var(--text);
    }
    .likert label:hover{background: rgba(255,255,255,.06); border-color: rgba(124,92,255,.45)}
    .likert label.selected{background: rgba(124,92,255,.18); border-color: rgba(124,92,255,.65)}
    .likert input{display:none}
    .likert .num{font-size:18px; font-weight:600}
    .likert-anchors{display:flex; justify-content:space-between; font-size:12px; color:var(--muted); margin-top:4px}

    /* === Email block === */
    .email{
      line-height:1.65; font-size:15px; padding:18px 18px;
      background: rgba(0,0,0,.22); border:1px dashed rgba(147,164,199,.35);
      border-radius:14px; white-space:pre-wrap;
      user-select:text;
    }
    .email::selection{ background: var(--hl); }
    .selection-box{
      font-family:var(--mono); font-size:12px; color: rgba(234,240,255,.92);
      background: rgba(124,92,255,.12); border:1px solid rgba(124,92,255,.4);
      padding:10px 12px; border-radius:12px; margin-top:10px;
    }

    /* === Adnotation list === */
    .list{display:flex; flex-direction:column; gap:10px; margin-top:8px}
    .item{
      border:1px solid var(--line); border-radius:14px; padding:12px 14px;
      background: rgba(255,255,255,.03);
    }
    .item-top{display:flex; justify-content:space-between; gap:10px; align-items:flex-start; flex-wrap:wrap}
    .badge{
      font-size:11px; padding:4px 10px; border-radius:999px;
      border:1px solid rgba(124,92,255,.45); background: rgba(124,92,255,.16); color: rgba(234,240,255,.95);
      white-space:nowrap;
    }
    .badge.good{border-color:rgba(0,211,167,.5); background:rgba(0,211,167,.14)}
    .meta{font-size:12px; color:var(--muted); margin-top:6px}
    .quote{
      margin:10px 0 0; padding:10px 12px;
      border-left:3px solid rgba(124,92,255,.6);
      background: rgba(124,92,255,.08);
      border-radius:12px; white-space:pre-wrap; font-size:13px;
    }
    .empty{font-size:13px; color:var(--muted); padding:8px 0}

    .hint{font-size:13px; color:var(--muted); line-height:1.5}
    .danger-text{color: rgba(255,92,122,.95); font-size:13px}
    .ok-text{color: rgba(0,211,167,.95); font-size:13px}

    .consent-box{
      max-height:240px; overflow:auto;
      padding:14px 16px; border:1px solid var(--line); border-radius:12px;
      background: rgba(0,0,0,.18); font-size:13px; line-height:1.55; color:var(--text);
    }
    .center{text-align:center}
    .spinner{
      display:inline-block; width:16px; height:16px; border:2px solid rgba(255,255,255,.25);
      border-top-color: var(--accent2); border-radius:50%; animation: spin .9s linear infinite;
      vertical-align:middle; margin-right:8px;
    }
    @keyframes spin{ to { transform:rotate(360deg) } }
    .screen-title-row{display:flex; gap:10px; align-items:center; flex-wrap:wrap; margin-bottom:6px}
    .step-info{color:var(--muted); font-size:13px}

    .blocks-grid{display:flex; flex-direction:column; gap:22px}

    /* === Sekcje: anotacje (silne) i ocena (subtelniejsze) === */
    .section-annot{
      background: rgba(124,92,255,.06);
      border:1px solid rgba(124,92,255,.28);
      border-radius:14px;
      padding:14px 16px;
    }
    .section-rating{
      background: rgba(255,255,255,.02);
      border:1px solid var(--line);
      border-radius:14px;
      padding:14px 16px;
    }
    .section-annot h3, .section-rating h3{ margin-top:0 }
    .section-rating h3{ color: var(--muted); font-weight:600; font-size:14px; text-transform:uppercase; letter-spacing:.4px }

    .nudge{
      font-size:12px; color:var(--muted);
      padding:8px 10px; border-radius:10px;
      background: rgba(255,255,255,.03);
      border:1px dashed var(--line);
      margin:8px 0 4px;
    }
    .intensity-hint{
      font-size:12px; color:var(--muted); line-height:1.5;
      margin-top:6px;
    }
    .intensity-hint b{ color: var(--text); font-weight:600 }

    .ai-scale{
      display:grid; grid-template-columns: repeat(5, 1fr); gap:6px;
    }
    .ai-scale label{
      display:flex; flex-direction:column; align-items:center; justify-content:center; gap:4px;
      padding:10px 6px; border:1px solid var(--line); border-radius:12px;
      background: rgba(255,255,255,.03); cursor:pointer; margin:0;
      font-size:12px; text-align:center; line-height:1.3; color:var(--text);
      transition: background .15s ease, border-color .15s ease;
    }
    .ai-scale label:hover{background: rgba(255,255,255,.06); border-color: rgba(124,92,255,.45)}
    .ai-scale label.selected{background: rgba(124,92,255,.18); border-color: rgba(124,92,255,.65)}
    .ai-scale input{display:none}

    .info-list{padding-left:20px; line-height:1.6; font-size:14px}
    .info-list li{margin-bottom:6px}
    .warmup-banner{
      padding:10px 12px; border-radius:12px; font-size:13px;
      background: rgba(0,211,167,.10); border:1px solid rgba(0,211,167,.35);
      color:var(--text); margin-bottom:10px;
    }
    .err-msg{
      padding:10px 12px; border-radius:12px; font-size:13px;
      background: rgba(255,92,122,.10); border:1px solid rgba(255,92,122,.4);
      color:#ffd0d8; margin-top:10px; display:none;
    }
    .ok-msg{
      padding:14px 16px; border-radius:12px; font-size:14px;
      background: rgba(0,211,167,.10); border:1px solid rgba(0,211,167,.4);
      color:var(--text); margin-top:10px;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <div>
        <h1>Badanie: styl komunikacji w e-mailach biznesowych</h1>
        <p class="sub">Czas wypełnienia: ok. 5–7 minut • Badanie anonimowe</p>
      </div>
      <div class="pill" id="stepPill">Krok 1 / 9</div>
    </header>

    <div class="progress"><span id="progressBar" style="width:11%"></span></div>

    <main id="app"></main>
  </div>

  <script>
  /* =============================================================
     KONFIGURACJA — wklej URL Apps Script (Web App /exec)
     ============================================================= */
  const SCRIPT_URL = ""; // <-- TU WSTAW URL Z APPS SCRIPT (deploy → web app → /exec)

  /* =============================================================
     TREŚĆ MAILI (3 + 1 warm-up). Edytuj dowolnie.
     ============================================================= */
  const WARMUP_EMAIL = {
    id: "warmup_01",
    subject: "Przykład wstępny — zaproszenie na spotkanie",
    body:
`Cześć,
chciałbym zaprosić Cię na krótkie spotkanie w przyszłym tygodniu, aby omówić bieżący status projektu.
Czy wtorek o 10:00 będzie odpowiedni?
Pozdrawiam,
Adam`
  };

  const EMAILS = [
    {
      id: "mail_01",
      subject: "Mail 1 — podsumowanie spotkania",
      body:
`Dzień dobry,
dziękujemy za spotkanie. Poniżej przesyłamy podsumowanie ustaleń oraz kolejne kroki.
W ramach następnego etapu przygotujemy propozycję harmonogramu i zidentyfikujemy zależności między zespołami.
Jeżeli mają Państwo dodatkowe pytania, pozostajemy do dyspozycji.
Z poważaniem,
Zespół Projektowy`
    },
    {
      id: "mail_02",
      subject: "Mail 2 — informacja o opóźnieniu",
      body:
`Cześć Marto,
piszę w sprawie raportu kwartalnego, o którym rozmawialiśmy wczoraj.
Niestety dane z działu finansów dotrą dopiero w piątek po południu, więc finalną wersję wyślę Ci w poniedziałek rano.
Dam znać wcześniej, jeśli coś się zmieni.
Pozdrawiam,
Karol`
    },
    {
      id: "mail_03",
      subject: "Mail 3 — prośba o feedback",
      body:
`Szanowni Państwo,
w nawiązaniu do naszej dotychczasowej współpracy oraz w trosce o jakość świadczonych usług, uprzejmie prosimy o podzielenie się Państwa opinią na temat ostatniego wdrożenia.
Państwa informacja zwrotna jest dla nas niezwykle cenna i pozwoli nam stale doskonalić nasze procesy.
Z wyrazami szacunku,
Dział Obsługi Klienta`
    }
  ];

  /* =============================================================
     KATALOGI / SŁOWNIKI
     ============================================================= */
  const TAGS = [
    { v:"konkretne",         l:"Konkretne / precyzyjne" },
    { v:"naturalne",         l:"Naturalne / płynne" },
    { v:"kontekst",          l:"Dopasowane do kontekstu" },
    { v:"indywidualny-styl", l:"Indywidualny styl / charakter" },
    { v:"zbyt-ogolne",       l:"Zbyt ogólne / brak konkretu" },
    { v:"zbyt-uprzejme",     l:"Nadmierna grzeczność / „korpo-ton”" },
    { v:"szablon",           l:"Szablonowość / formułki" },
    { v:"nienaturalny-szyk", l:"Nienaturalny szyk / słownictwo" },
    { v:"powtorzenia",       l:"Powtórzenia / redundancja" },
    { v:"brak-osadzenia",    l:"Brak odniesień do kontekstu" },
    { v:"inne",              l:"Inne" }
  ];

  const AGE_RANGES   = ["18–24","25–34","35–44","45–54","55+"];
  const EXPERIENCE   = ["0–2","3–5","6–10","10+"];
  const JOB_LEVELS   = [
    "Specjalista / wykonawca",
    "Starszy specjalista",
    "Manager / lider zespołu",
    "Właściciel / freelancer",
    "Inne"
  ];
  const AI_TASKS     = [
    "Pisanie maili",
    "Streszczenia / podsumowania",
    "Tłumaczenia",
    "Programowanie",
    "Burza mózgów / pomysły",
    "Edycja stylistyczna",
    "Analiza danych",
    "Inne",
    "Nie używam AI"
  ];
  const LIKERT_5 = [
    { v:1, l:"1" }, { v:2, l:"2" }, { v:3, l:"3" }, { v:4, l:"4" }, { v:5, l:"5" }
  ];
  const AI_LIKELIHOOD = [
    { v:1, l:"zdecydowanie AI" },
    { v:2, l:"raczej AI" },
    { v:3, l:"trudno powiedzieć" },
    { v:4, l:"raczej człowiek" },
    { v:5, l:"zdecydowanie człowiek" }
  ];

  /* =============================================================
     STAN GLOBALNY
     ============================================================= */
  function uuid(){
    return 'r-' + Date.now().toString(36) + '-' +
      Math.random().toString(36).slice(2,8) +
      Math.random().toString(36).slice(2,6);
  }
  function shuffle(arr){
    const a = arr.slice();
    for (let i=a.length-1; i>0; i--){
      const j = Math.floor(Math.random()*(i+1));
      [a[i],a[j]] = [a[j],a[i]];
    }
    return a;
  }

  const state = {
    respondentId: uuid(),
    startedAt: new Date().toISOString(),
    consent: false,
    demographics: { ageRange:"", experience:"", jobLevel:"" },
    aiExperience: { freqUse:null, tasks:[], knowledge:null, contactAi:null },
    qualitative: "",
    warmupAnnotations: [],
    emails: shuffle(EMAILS).map((m, i) => ({
      id: m.id,
      subject: m.subject,
      body: m.body,
      position: i+1,
      annotations: [],
      ratings: {
        naturalnosc:null, typowosc:null, wiarygodnosc:null,
        relacyjnosc:null, ai_likelihood:null, pewnosc:null
      }
    })),
    screen: 0, // index w SCREENS
  };

  /* =============================================================
     LISTA EKRANÓW (router)
     ============================================================= */
  const SCREENS = [
    { id:"consent",   render: renderConsent,   title:"Świadoma zgoda" },
    { id:"demo",      render: renderDemo,      title:"Podstawowe informacje" },
    { id:"instr",     render: renderInstr,     title:"Instrukcja zadania" },
    { id:"warmup",    render: renderWarmup,    title:"Warm-up (nieanalizowany)" },
    { id:"email1",    render: renderEmail(0), title:"E-mail 1 z 3" },
    { id:"email2",    render: renderEmail(1), title:"E-mail 2 z 3" },
    { id:"email3",    render: renderEmail(2), title:"E-mail 3 z 3" },
    { id:"ai",        render: renderAiExperience, title:"Doświadczenie z AI" },
    { id:"qual",      render: renderQualitative,   title:"Pytanie otwarte" },
    { id:"thanks",    render: renderThanks,        title:"Dziękujemy" }
  ];

  /* =============================================================
     RENDER GŁÓWNY + NAWIGACJA
     ============================================================= */
  const app = document.getElementById("app");

  function updateProgress(){
    // Ekran "thanks" nie liczy się jako krok respondenta — tylko 9 aktywnych ekranów
    const lastIdx = SCREENS.findIndex(s => s.id === "thanks");
    const totalSteps = lastIdx; // 9
    const stepPill = document.getElementById("stepPill");
    const bar = document.getElementById("progressBar");
    if (state.screen >= lastIdx){
      bar.style.width = "100%";
      stepPill.textContent = "Zakończone";
    } else {
      const cur = state.screen + 1;
      const pct = Math.round((cur/totalSteps) * 100);
      bar.style.width = pct + "%";
      stepPill.textContent = `Krok ${cur} / ${totalSteps}`;
    }
  }

  function showError(msg){
    const e = document.getElementById("errBox");
    if (!e) return;
    e.textContent = msg;
    e.style.display = "block";
    e.scrollIntoView({ behavior:"smooth", block:"center" });
  }
  function clearError(){
    const e = document.getElementById("errBox");
    if (e) e.style.display = "none";
  }

  function nav({onBack, onNext, nextLabel="Dalej", backLabel="Wstecz", nextDisabled=false, hideBack=false}){
    const wrap = document.createElement("div");
    wrap.className = "nav";

    const back = document.createElement("button");
    back.className = "btn";
    back.textContent = backLabel;
    back.onclick = onBack;
    if (hideBack) back.style.visibility = "hidden";

    const next = document.createElement("button");
    next.className = "btn primary";
    next.textContent = nextLabel;
    next.disabled = nextDisabled;
    next.onclick = onNext;

    wrap.appendChild(back);
    wrap.appendChild(next);
    return wrap;
  }

  function goTo(i){
    state.screen = Math.max(0, Math.min(SCREENS.length-1, i));
    render();
  }
  function next(){ goTo(state.screen + 1); }
  function back(){ goTo(state.screen - 1); }

  function render(){
    app.innerHTML = "";
    updateProgress();
    const screen = SCREENS[state.screen];
    screen.render(app);
    window.scrollTo({ top:0, behavior:"smooth" });
  }

  /* =============================================================
     EKRAN 1 — ZGODA
     ============================================================= */
  function renderConsent(root){
    const card = document.createElement("section");
    card.className = "card";
    card.innerHTML = `
      <div class="card-h"><strong>Ekran 1 — Świadoma zgoda</strong><span class="step-info">~30 s</span></div>
      <div class="card-b">
        <h2>Witaj!</h2>
        <p class="sub" style="margin-bottom:14px">
          Celem badania jest ocena stylu komunikacji w e-mailach biznesowych.
          Zostaniesz poproszony/a o przeczytanie kilku wiadomości oraz zaznaczenie fragmentów, które zwracają Twoją uwagę.
          Badanie jest anonimowe i zajmie około 5–7 minut.
        </p>

        <h3>Świadoma zgoda</h3>
        <div class="consent-box">

  function fillTagSelect(sel){
    sel.innerHTML = TAGS.map(t => `<option value="${t.v}">${t.l}</option>`).join("");
  }

  function setupEmailAnnotation(o){
    let currentSelection = null;
    const setBox = (msg) => {
      if (!msg){
        o.selectionBox.style.display = "none";
        o.selectionBox.textContent = "";
      } else {
        o.selectionBox.style.display = "block";
        o.selectionBox.textContent = msg;
      }
    };

    o.intensityEl.addEventListener("input", () => {
      o.intensityValEl.textContent = o.intensityEl.value;
    });

    // === Auto-capture: zaznaczenie myszą = od razu zapisane (bez klikania "Zapisz") ===
    const tryCapture = () => {
      const sel = window.getSelection();
      if (!sel || sel.rangeCount === 0) return;
      const text = sel.toString().trim();
      if (!text){ return; }
      const range = sel.getRangeAt(0);
      if (!o.emailEl.contains(range.commonAncestorContainer)) return;
      const start = range.startOffset;
      const end = range.endOffset;
      currentSelection = { text, start, end };
      setBox(`Zaznaczono: „${text}”  (znaki ${start}–${end}). Wybierz etykietę i kliknij „Dodaj adnotację”.`);
    };

    // Zaznaczanie myszą — capture po puszczeniu przycisku
    o.emailEl.addEventListener("mouseup", () => setTimeout(tryCapture, 0));
    // Klawiatura — Shift+strzałki itp.
    o.emailEl.addEventListener("keyup", () => setTimeout(tryCapture, 0));
    // Touch — palec na ekranach dotykowych
    o.emailEl.addEventListener("touchend", () => setTimeout(tryCapture, 0));

    o.clearBtn.addEventListener("click", () => {
      currentSelection = null;
      window.getSelection()?.removeAllRanges();
      setBox("");
    });

    o.addBtn.addEventListener("click", () => {
      // Spróbuj jeszcze raz — jeśli ktoś zaznaczył, ale event nie złapał (np. focus poszedł gdzieś indziej)
      if (!currentSelection) tryCapture();
      if (!currentSelection){
        setBox("Najpierw zaznacz fragment w treści e-maila — wystarczy przeciągnąć myszą po wybranym tekście.");
        return;
      }
      const ann = {
        respondentId: state.respondentId,
        emailId: o.emailId,
        mail_position: o.mailPosition,
        tag: o.tagEl.value,
        tagLabel: TAGS.find(t => t.v === o.tagEl.value)?.l || o.tagEl.value,
        intensity: Number(o.intensityEl.value),
        comment: (o.commentEl.value || "").trim().slice(0, 200),
        text: currentSelection.text,
        start: currentSelection.start,
        end: currentSelection.end,
        ts: new Date().toISOString()
      };
      o.annotations.push(ann);
      currentSelection = null;
      window.getSelection()?.removeAllRanges();
      setBox("");
      o.commentEl.value = "";
      o.intensityEl.value = 3;
      o.intensityValEl.textContent = "3";
      renderAnnotationList(o);
    });

    renderAnnotationList(o);
  }

  function renderAnnotationList(o){
    o.listEl.innerHTML = "";
    o.emptyEl.style.display = o.annotations.length ? "none" : "block";
    o.annotations.forEach((a, idx) => {
      const item = document.createElement("div");
      item.className = "item";
      const top = document.createElement("div");
      top.className = "item-top";
      const left = document.createElement("div");
      left.innerHTML = `
        <div>
          <span class="badge">${a.tagLabel || a.tag}</span>
          <span class="badge good">intensywność ${a.intensity}/5</span>
        </div>
        <div class="meta">#${idx+1} • znaki ${a.start}–${a.end}</div>
      `;
      const del = document.createElement("button");
      del.className = "btn danger";
      del.textContent = "Usuń";
      del.onclick = () => { o.annotations.splice(idx,1); renderAnnotationList(o); };
      top.appendChild(left); top.appendChild(del);

      const quote = document.createElement("div");
      quote.className = "quote";
      quote.textContent = a.text;

      const c = document.createElement("div");
      c.className = "meta";
      c.textContent = a.comment ? `Komentarz: ${a.comment}` : "Komentarz: —";

      item.appendChild(top); item.appendChild(quote); item.appendChild(c);
      o.listEl.appendChild(item);
    });
  }

        const v = e.target.value;
        if (e.target.checked){
          if (!state.aiExperience.tasks.includes(v)) state.aiExperience.tasks.push(v);
          lab.classList.add("selected");
        } else {
          state.aiExperience.tasks = state.aiExperience.tasks.filter(x => x !== v);
          lab.classList.remove("selected");
        }
        clearError();
      });
      tasksWrap.appendChild(lab);
    });

    root.appendChild(nav({
      onBack: back,
      onNext: () => {
        const a = state.aiExperience;
        if (a.freqUse == null || a.knowledge == null || a.contactAi == null){
          showError("Odpowiedz na pytania 1, 3 i 4. Pytanie 2 może pozostać puste."); return;
        }
        next();
      }
    }));
  }

  /* =============================================================
     EKRAN 9 — PYTANIE OTWARTE
     ============================================================= */
  function renderQualitative(root){
    const card = document.createElement("section");
    card.className = "card";
    card.innerHTML = `
      <div class="card-h"><strong>Ekran 9 — Pytanie otwarte</strong><span class="step-info">~1 min</span></div>
      <div class="card-b">
        <h2>Ostatnie pytanie</h2>
        <label>Gdybyś miał(a) odrzucić jeden z tych maili do klienta — który by to był i dlaczego?</label>
        <textarea id="qual" maxlength="1500" placeholder="napisz kilka zdań…">${escapeHtml(state.qualitative)}</textarea>
        <p class="field-hint">Możesz pominąć to pytanie i przejść dalej.</p>
        <div id="errBox" class="err-msg"></div>
      </div>
    `;
    root.appendChild(card);

    const ta = card.querySelector("#qual");
    ta.addEventListener("input", () => { state.qualitative = ta.value; });

    root.appendChild(nav({
      onBack: back,
      onNext: () => { submitAndFinish(); },
      nextLabel: "Zakończ i wyślij"
    }));
  }

  /* =============================================================
     EKRAN 10 — DZIĘKUJEMY (po wysyłce)
     ============================================================= */
  function renderThanks(root){
    const card = document.createElement("section");
    card.className = "card";
    card.innerHTML = `
      <div class="card-h"><strong>Ekran finalny</strong><span class="step-info">koniec</span></div>
      <div class="card-b center">
        <h2 style="margin-top:8px">Dziękujemy za udział! 🎉</h2>
        <p class="sub" style="max-width:520px; margin:0 auto 14px">
          Twoje odpowiedzi zostały zapisane. Możesz zamknąć tę kartę przeglądarki.
        </p>
        <div class="ok-msg" id="okMsg" style="display:none">Wyniki zostały zapisane.</div>
        <div class="err-msg" id="errBox"></div>
        <div class="row center" style="justify-content:center; margin-top:14px">
          <button class="btn" id="btnRetry" style="display:none">Spróbuj ponownie wysłać</button>
        </div>
      </div>
    `;
    root.appendChild(card);

    const ok = card.querySelector("#okMsg");
    const retry = card.querySelector("#btnRetry");
    if (state._sendStatus === "ok"){
      ok.style.display = "block";
    } else if (state._sendStatus === "err"){
      showError("Wystąpił problem z zapisem wyników. Spróbuj ponownie.");
      retry.style.display = "inline-flex";
      retry.onclick = () => submitAndFinish();
    } else {
      // domyślnie po wejściu na ekran przez submit
      ok.style.display = "block";
    }
  }

  /* =============================================================
     WYSYŁKA — jeden batch payload do Apps Script
     ============================================================= */
  async function submitAndFinish(){
    // Zbuduj payload
    const payload = buildPayload();

    // Pokaż ekran „Dziękujemy” z komunikatem ładowania
    state.screen = SCREENS.findIndex(s => s.id === "thanks");
    render();
    const ok = document.getElementById("okMsg");
    const err = document.getElementById("errBox");
    const retry = document.getElementById("btnRetry");
    if (ok) ok.style.display = "none";
    if (err) err.style.display = "none";
    if (retry) retry.style.display = "none";

    const card = document.querySelector(".card .card-b.center");
    const loading = document.createElement("div");
    loading.id = "loadingMsg";
    loading.className = "sub";
    loading.innerHTML = `<span class="spinner"></span> Zapisywanie odpowiedzi…`;
    card.insertBefore(loading, card.querySelector(".ok-msg"));

    try {
      if (!SCRIPT_URL){
        // brak konfiguracji — nie blokuj respondenta; loguj do konsoli
        console.warn("Brak SCRIPT_URL — payload nie zostanie wysłany.", payload);
        await new Promise(r => setTimeout(r, 600));
        state._sendStatus = "ok";
      } else {
        const body = new URLSearchParams();
        body.append("payload", JSON.stringify(payload));
        const res = await fetch(SCRIPT_URL, { method:"POST", body, redirect:"follow" });
        if (!res.ok) throw new Error("HTTP " + res.status);
        state._sendStatus = "ok";
      }
    } catch (e){
      console.error(e);
      state._sendStatus = "err";
    }

    // Odśwież ekran z wynikiem
    render();
  }

  function buildPayload(){
    const completedAt = new Date().toISOString();
    const respondent = {
      respondentId: state.respondentId,
      consent: state.consent ? 1 : 0,
      ageRange: state.demographics.ageRange,
      experience: state.demographics.experience,
      jobLevel: state.demographics.jobLevel,
      aiFreqUse: state.aiExperience.freqUse,
      aiTasks: state.aiExperience.tasks.join("; "),
      aiKnowledge: state.aiExperience.knowledge,
      aiContact: state.aiExperience.contactAi,
      qualitative: state.qualitative,
      startedAt: state.startedAt,
      completedAt,
      userAgent: navigator.userAgent,
      language: navigator.language || "",
      // kolejność maili w danej sesji:
      emailOrder: state.emails.map(e => `${e.position}:${e.id}`).join(",")
    };

    const annotations = [];
    state.emails.forEach(mail => {
      mail.annotations.forEach(a => {
        annotations.push({
          respondentId: state.respondentId,
          emailId: mail.id,
          mail_position: mail.position,
          tag: a.tag,
          tagLabel: a.tagLabel || "",
          intensity: a.intensity,
          start: a.start,
          end: a.end,
          text: a.text,
          comment: a.comment,
          ts: a.ts
        });
      });
    });

    const ratings = state.emails.map(mail => ({
      respondentId: state.respondentId,
      emailId: mail.id,
      mail_position: mail.position,
      naturalnosc: mail.ratings.naturalnosc,
      typowosc: mail.ratings.typowosc,
      wiarygodnosc: mail.ratings.wiarygodnosc,
      relacyjnosc: mail.ratings.relacyjnosc,
      ai_likelihood: mail.ratings.ai_likelihood,
      pewnosc: mail.ratings.pewnosc,
      ts: completedAt
    }));

    return {
      meta: { study: "AI_vibe_full", schema: "v1", sentAt: completedAt },
      respondent,
      annotations,
      ratings
    };
  }

  /* =============================================================
     UTILS
     ============================================================= */
  function escapeHtml(s){
    return String(s)
      .replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")
      .replace(/"/g,"&quot;").replace(/'/g,"&#39;");
  }
  function escapeAttr(s){ return escapeHtml(s); }

  /* === START === */
  render();
  </script>
</body>
</html>
